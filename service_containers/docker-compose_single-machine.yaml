services:
  postgres:
    image: postgres:latest
    container_name: postgres_container
    volumes:
      - /postgresql_data/var:/var/lib/postgresql
      - /postgresql_data/data:/data/postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: upstage
      PGDATA: /data/postgres
    networks:
      name: upstage-network

  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - /mongodb_data_volume:/data
    restart: unless-stopped
    # This network range corresponds to the one used in multi_machine_iptables_config.txt .
    # This is only necessary when running UpStage across multiple machines.
    # Change the range as needed in the iptables file and here if this range is already in use.
    networks:
      name: upstage-network

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_container
    # Leave these ports exposed.
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      # Auto-change the password in the pw.txt file referenced below:
      - /mosquitto_files/etc/mosquitto:/etc/mosquitto
      - /mosquitto_files/var/lib/mosquitto:/var/lib/mosquitto
      - /etc/letsencrypt:/etc/letsencrypt
    # This network range corresponds to the one used in multi_machine_iptables_config.txt .
    # This is only necessary when running UpStage across multiple machines.
    # Change the range as needed in the iptables file and here if this range is already in use.
    networks:
      name: upstage-network
    command:
      /bin/sh -c "cp /etc/mosquitto/pw.backup /etc/mosquitto/pw.txt &&
      chmod 0700 /etc/mosquitto/pw.txt &&
      chown root:root /etc/mosquitto/pw.txt &&
      mosquitto_passwd -U /etc/mosquitto/pw.txt &&
      chown mosquitto:mosquitto /etc/mosquitto/pw.txt &&
      chown mosquitto:mosquitto /var/lib/mosquitto &&
      /etc/mosquitto/cron/add_mqtt_cert_crontab.sh &&
      mkdir -p /etc/http &&
      mosquitto -c /etc/mosquitto/mosquitto.conf"
      #/bin/sh -c "/bin/sh"
    restart: no

# Commenting out all networking config in this file is best if you're NOT running UpStage in
# multuiple server configuration. 
networks:
  upstage-network:
    driver: bridge
    external: true
volumes:
  postgresql_files:
  mongodb_data_volume:
  mosquitto_files:
