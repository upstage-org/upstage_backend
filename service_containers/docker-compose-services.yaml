name: upstage-services-${SITE}
services:
  postgres:
    image: postgres:latest
    container_name: postgres_container_${SITE}
    user: "999:999"
    volumes:
      - ${PG_DATA_DIR}/var:/var/lib/postgresql
      - ${PG_DATA_DIR}/data:/data/postgres
    #ports:
    #  - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: upstage
      PGDATA: /data/postgres
    networks:
      - upstage-network
    command: postgres -c listen_addresses='*'

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_container_${SITE}
    user: "1883:1883"
    # Uncomment this only if you're running locally.
    #ports:
    #  #- "2096:1883" docker containers use the internal port when on the same machine and network.
    #  - "${MOSQUITTO_EXPOSED_WS_PORT}:9001"
    volumes:
      - ${MQ_DATA_DIR}/etc/mosquitto:/etc/mosquitto
      - ${MQ_DATA_DIR}/var/lib/mosquitto:/var/lib/mosquitto
      - /etc/letsencrypt:/etc/letsencrypt
    networks:
      - upstage-network
    command:
      # Resync the password in the pw.txt file referenced below:
      /bin/sh -c "cp /etc/mosquitto/pw.backup /etc/mosquitto/pw.txt &&
      chmod 0700 /etc/mosquitto/pw.txt &&
      mosquitto_passwd -U /etc/mosquitto/pw.txt &&
      chown mosquitto:mosquitto /etc/mosquitto/pw.txt &&
      chown mosquitto:mosquitto /var/lib/mosquitto &&
      mosquitto -c /etc/mosquitto/mosquitto.conf"
    restart: no

networks:
  upstage-network:
    name: upstage-network-${SITE}
    driver: bridge
    external: true
volumes:
  postgresql_files:
  mosquitto_files:
