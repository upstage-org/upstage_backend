name: upstage-backend-${SITE}

# Application code is baked in at docker build (see x_common_build). No bind mounts for sources or .venv.

# ====================== Common Build (Simplified & Reliable) ======================
x-common-build: &common_build |
  # syntax=docker/dockerfile:1
  FROM python:3.12-slim-bookworm AS builder

  # uv: copied only into this builder stage; removed again before this stage ends (see RUN below).
  # No BuildKit cache mounts — deps resolve inside the ephemeral build layer only (no host-backed uv cache dir).

  COPY --from=ghcr.io/astral-sh/uv:latest /uv /uvx /bin/

  # Build venv at /usr/app/.venv so console script shebangs match the runtime COPY path.
  WORKDIR /usr/app

  # Use the base image CPython only (portable across multi-stage COPY); not uv-managed Python under /root or $HOME.
  ENV UV_PYTHON=/usr/local/bin/python3.12 \
      UV_COMPILE_BYTECODE=1 \
      UV_LINK_MODE=copy \
      UV_PYTHON_DOWNLOADS=never \
      UV_NO_CACHE=1 \
      PYTHONDONTWRITEBYTECODE=1 \
      PYTHONUNBUFFERED=1

  COPY pyproject.toml ./
  COPY uv.lock* ./

  RUN ( uv sync --python /usr/local/bin/python3.12 --frozen --no-dev --no-install-project \
        || uv sync --python /usr/local/bin/python3.12 --no-dev --no-install-project ) \
      && test -d /usr/app/.venv \
      && test -x /usr/app/.venv/bin/python \
      && P=$$(readlink -f /usr/app/.venv/bin/python) \
      && case "$$P" in /usr/*|/opt/*) true;; *) echo "builder venv python must resolve under /usr or /opt, got: $$P" >&2; exit 1;; esac \
      && rm -f /bin/uv /bin/uvx \
      && rm -rf /root/.local/share/uv /root/.cache/uv 2>/dev/null || true

  # === Runtime stage ===
  FROM python:3.12-slim-bookworm

  WORKDIR /usr/app

  # First-frame JPEG posters for uploads + Alembic backfill (video_poster.py).
  RUN apt-get update \
      && apt-get install -y --no-install-recommends ffmpeg \
      && rm -rf /var/lib/apt/lists/*

  # Copy project venv from builder (shebangs point to /usr/app/.venv/bin/python)
  COPY --from=builder /usr/app/.venv /usr/app/.venv
  RUN test -d /usr/app/.venv && test -x /usr/app/.venv/bin/python \
      && P=$$(readlink -f /usr/app/.venv/bin/python) && case "$$P" in /usr/*|/opt/*) true;; *) echo "runtime venv python must resolve under /usr or /opt, got: $$P" >&2; exit 1;; esac

  ENV VIRTUAL_ENV="/usr/app/.venv" \
      PATH="/usr/app/.venv/bin:$$PATH" \
      PYTHONDONTWRITEBYTECODE=1 \
      PYTHONUNBUFFERED=1

  # bookworm: shadow-utils; binaries live in /usr/sbin (PATH in RUN can omit it → 127)
      RUN /usr/sbin/groupadd --gid ${APP_GROUP:?APP_GROUP is not set} appuser && \
      /usr/sbin/useradd --uid ${APP_USER:?APP_USER is not set} --gid ${APP_GROUP:?APP_GROUP is not set} \
              --create-home --shell /bin/bash appuser && \
      mkdir -p uploads

  # Bake in sources (replaces former /app_code_${SITE} bind mounts).
  COPY --chown=appuser:appuser pyproject.toml uv.lock* ./
  COPY --chown=appuser:appuser pytest.ini conftest.py ./
  COPY --chown=appuser:appuser src ./src
  COPY --chown=appuser:appuser scripts ./scripts
  COPY --chown=appuser:appuser alembic ./alembic
  COPY --chown=appuser:appuser migration_scripts ./migration_scripts
  COPY --chown=appuser:appuser tests ./tests
  COPY --chown=appuser:appuser general_tests ./general_tests
  COPY --chown=appuser:appuser dashboard/demo ./dashboard/demo
  RUN chown -R appuser:appuser uploads /usr/app/dashboard/demo

  # Editable install of upstage_backend itself (deps already in .venv from builder
  # stage via `uv sync --no-install-project`). Per workspace rule, the package
  # must be importable everywhere without PYTHONPATH exports.
  RUN /usr/app/.venv/bin/python -m ensurepip --upgrade --default-pip \
      && /usr/app/.venv/bin/pip install --no-deps --no-cache-dir -e . \
      && /usr/app/.venv/bin/python -c "import upstage_backend; print('upstage_backend installed at', upstage_backend.__file__)"

  USER appuser

# ====================== Services ======================
services:
  # One-shot migration + install-bootstrap runner. Exits 0 once Alembic is at
  # heads and, on a NEW installation only (zero stages in the DB), the demo
  # scaffold has seeded the Demo Stage (media, scene, board, default logins) —
  # see scripts/run_bootstrap.py. On established installs the bootstrap is a
  # no-op skip. The three
  # long-running services below `depends_on` this with
  # `service_completed_successfully`, so on a fresh DB nobody tries to write
  # to a not-yet-created table (formerly produced
  # `relation "connection_stats" does not exist` from upstage_stats on first
  # MQTT message). Single migration runner across the whole compose project.
  upstage_db_migrate:
    build:
      context: ../
      dockerfile_inline: *common_build
    # Per-site tag (shared with upstage_backend below — same image, different
    # commands). dev and prod must never share an image: sources are baked in
    # at build time and the SITE differs between deployments.
    image: upstage/backend:${SITE}
    container_name: upstage_db_migrate_${SITE}
    user: "${APP_USER}:${APP_GROUP}"
    # Same mount as upstage_backend: poster backfill migrations walk this tree.
    volumes:
      - /app_code_${SITE}/uploads:/usr/app/uploads
    command: >
      /bin/bash -c "
      cd /usr/app &&
      export HARDCODED_HOSTNAME=${HARDCODED_HOSTNAME} &&
      python -m alembic -c ./scripts/alembic.ini upgrade heads &&
      python -m scripts.run_bootstrap"
    restart: "no"
    networks:
      - upstage-network

  upstage_backend:
    build:
      context: ../
      dockerfile_inline: *common_build
    image: upstage/backend:${SITE}
    container_name: upstage_backend_${SITE}
    user: "${APP_USER}:${APP_GROUP}"
    ports:
      - "${APP_PORT}:3000"
    # Host dir must exist and be writable by APP_USER:APP_GROUP (run_docker_compose_* scripts mkdir+chown).
    volumes:
      - /app_code_${SITE}/uploads:/usr/app/uploads
    depends_on:
      upstage_db_migrate:
        condition: service_completed_successfully
    command: >
      /bin/bash -c "
      cd /usr/app &&
      export HARDCODED_HOSTNAME=${HARDCODED_HOSTNAME} &&
      ./scripts/start_upstage.sh"
    restart: unless-stopped
    networks:
      - upstage-network

  upstage_event_archive:
    build:
      context: ../
      dockerfile_inline: *common_build
    image: upstage/event-archive:${SITE}
    container_name: upstage_event_archive_${SITE}
    user: "${APP_USER}:${APP_GROUP}"
    depends_on:
      upstage_db_migrate:
        condition: service_completed_successfully
    command: >
      /bin/bash -c "
      cd /usr/app &&
      export HARDCODED_HOSTNAME=${HARDCODED_HOSTNAME} &&
      ./scripts/run_event_archive.sh"
    restart: unless-stopped
    networks:
      - upstage-network

  upstage_stats:
    build:
      context: ../
      dockerfile_inline: *common_build
    image: upstage/stats:${SITE}
    container_name: upstage_stats_${SITE}
    user: "${APP_USER}:${APP_GROUP}"
    depends_on:
      upstage_db_migrate:
        condition: service_completed_successfully
    command: >
      /bin/bash -c "
      cd /usr/app &&
      export HARDCODED_HOSTNAME=${HARDCODED_HOSTNAME} &&
      ./scripts/run_upstage_stats.sh"
    restart: unless-stopped
    networks:
      - upstage-network

networks:
  upstage-network:
    name: upstage-network-${SITE}
    driver: bridge
    external: true
