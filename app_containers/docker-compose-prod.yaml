name: upstage-backend-prod

# Application code is baked in at docker build (see x_common_build). No bind mounts for sources or .venv.

# ====================== Common Build (Simplified & Reliable) ======================
x-common-build: &common_build |
  # syntax=docker/dockerfile:1
  FROM python:3.12-slim-bookworm AS builder

  # uv: copied only into this builder stage; removed again before this stage ends (see RUN below).
  # No BuildKit cache mounts — deps resolve inside the ephemeral build layer only (no host-backed uv cache dir).

  COPY --from=ghcr.io/astral-sh/uv:latest /uv /uvx /bin/

  # Build venv at /usr/app/.venv so console script shebangs match the runtime COPY path.
  WORKDIR /usr/app

  # Use the base image CPython only (portable across multi-stage COPY); not uv-managed Python under /root or $HOME.
  ENV UV_PYTHON=/usr/local/bin/python3.12 \
      UV_COMPILE_BYTECODE=1 \
      UV_LINK_MODE=copy \
      UV_PYTHON_DOWNLOADS=never \
      UV_NO_CACHE=1 \
      PYTHONDONTWRITEBYTECODE=1 \
      PYTHONUNBUFFERED=1

  COPY pyproject.toml ./
  COPY uv.lock* ./

  RUN ( uv sync --python /usr/local/bin/python3.12 --frozen --no-dev --no-install-project \
        || uv sync --python /usr/local/bin/python3.12 --no-dev --no-install-project ) \
      && test -d /usr/app/.venv \
      && test -x /usr/app/.venv/bin/python \
      && P=$$(readlink -f /usr/app/.venv/bin/python) \
      && case "$$P" in /usr/*|/opt/*) true;; *) echo "builder venv python must resolve under /usr or /opt, got: $$P" >&2; exit 1;; esac \
      && rm -f /bin/uv /bin/uvx \
      && rm -rf /root/.local/share/uv /root/.cache/uv 2>/dev/null || true

  # === Runtime stage ===
  FROM python:3.12-slim-bookworm

  WORKDIR /usr/app

  # Copy project venv from builder (shebangs point to /usr/app/.venv/bin/python)
  COPY --from=builder /usr/app/.venv /usr/app/.venv
  RUN test -d /usr/app/.venv && test -x /usr/app/.venv/bin/python \
      && P=$$(readlink -f /usr/app/.venv/bin/python) && case "$$P" in /usr/*|/opt/*) true;; *) echo "runtime venv python must resolve under /usr or /opt, got: $$P" >&2; exit 1;; esac

  ENV VIRTUAL_ENV="/usr/app/.venv" \
      PATH="/usr/app/.venv/bin:$$PATH" \
      PYTHONDONTWRITEBYTECODE=1 \
      PYTHONUNBUFFERED=1

  # bookworm: shadow-utils; binaries live in /usr/sbin (PATH in RUN can omit it → 127)
  ARG HOST_UID=1000
  ARG HOST_GID=1000
  RUN /usr/sbin/groupadd --gid ${HOST_GID} appuser && \
      /usr/sbin/useradd --uid ${HOST_UID} --gid ${HOST_GID} \
              --create-home --shell /bin/bash appuser && \
      mkdir -p uploads

  # Bake in sources (replaces former /app_code bind mounts).
  COPY --chown=appuser:appuser pyproject.toml uv.lock* ./
  COPY --chown=appuser:appuser src ./src
  COPY --chown=appuser:appuser scripts ./scripts
  COPY --chown=appuser:appuser alembic ./alembic
  COPY --chown=appuser:appuser migration_scripts ./migration_scripts
  COPY --chown=appuser:appuser dashboard/demo ./dashboard/demo
  RUN chown -R appuser:appuser uploads /usr/app/dashboard/demo

  USER appuser

# ====================== Services ======================
services:
  upstage_backend:
    build:
      context: ../
      dockerfile_inline: *common_build
    image: upstage/backend:local
    container_name: upstage_backend
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "3001:3000"
    volumes:
      - /app_code/uploads:/usr/app/uploads
    command: >
      /bin/bash -c "
      cd /usr/app &&
      export HARDCODED_HOSTNAME=${HARDCODED_HOSTNAME} &&
      ./scripts/start_upstage.sh"
    restart: unless-stopped
    networks:
      - upstage-network

  upstage_event_archive:
    build:
      context: ../
      dockerfile_inline: *common_build
    image: upstage/event-archive:local
    container_name: upstage_event_archive
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: >
      /bin/bash -c "
      cd /usr/app &&
      export HARDCODED_HOSTNAME=${HARDCODED_HOSTNAME} &&
      ./scripts/run_event_archive.sh"
    restart: unless-stopped
    networks:
      - upstage-network

  upstage_stats:
    build:
      context: ../
      dockerfile_inline: *common_build
    image: upstage/stats:local
    container_name: upstage_stats
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: >
      /bin/bash -c "
      cd /usr/app &&
      export HARDCODED_HOSTNAME=${HARDCODED_HOSTNAME} &&
      ./scripts/run_upstage_stats.sh"
    restart: unless-stopped
    networks:
      - upstage-network

networks:
  upstage-network
    name: upstage-network
    driver: bridge
    external: true
