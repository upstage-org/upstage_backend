<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Generic colorful stand-in shown wherever media was deleted along with
       its owner's account. Seeded by the demo-stage scaffold; referenced by
       StudioService.delete_user via PLACEHOLDER_FILE_LOCATION. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e040fb"/>
