[pytest]

testpaths =
    */*/tests/*
    tests/unit

# `pythonpath = src` is kept for host runs without an editable install; in
# containers the package is installed via `pip install -e .` (see
# app_containers/docker-compose.yaml).
pythonpath = src

# `--import-mode=importlib` avoids the "package-name collision" trap that the
# default `prepend` mode hits when several `tests/__init__.py` packages exist
# (top-level `tests/` plus per-module `src/upstage_backend/*/tests/`).
addopts = -p no:warnings --import-mode=importlib
; log_cli = true
; log_level = ERROR
